
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Tracker — Weekly Analysis</title>
<style>
:root {
  --bg:#f1f5f9; --surface:#fff; --surface2:#f8fafc;
  --border:#e2e8f0; --border2:#cbd5e1;
  --accent:#2563eb; --accent2:#1d4ed8;
  --green:#16a34a; --green-bg:#f0fdf4; --green-border:#86efac;
  --amber:#b45309; --amber-bg:#fffbeb; --amber-border:#fcd34d;
  --red:#dc2626; --red-bg:#fef2f2; --red-border:#fca5a5;
  --text:#0f172a; --text2:#334155; --text3:#64748b;
  --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.sidebar-header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.sidebar-header p{font-size:11px;color:var(--text3);margin-top:2px;}
.sidebar-body{flex:1;overflow-y:auto;padding:10px 8px;}
.sidebar-body::-webkit-scrollbar{width:4px;}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.sidebar-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:6px 8px 4px;}
.stock-card{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .15s;}
.stock-card:hover{background:var(--surface2);border-color:var(--border);}
.stock-card.active{background:#eff6ff;border-color:var(--accent);}
.stock-card-top{display:flex;justify-content:space-between;align-items:center;}
.stock-symbol{font-size:13px;font-weight:700;}
.signal-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
.signal-BUY_MORE{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.signal-HOLD{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.signal-REVIEW{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.signal-PENDING{background:#f1f5f9;color:var(--text3);border:1px solid var(--border2);}
.signal-LOADING{background:rgba(37,99,235,.08);color:var(--accent);border:1px solid rgba(37,99,235,.2);}
.stock-card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:5px;}
.stock-price{font-size:13px;font-weight:600;}
.stock-upside{font-size:10px;color:var(--green);font-weight:600;}
.stock-name{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);}
.add-btn{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.add-btn:hover{background:var(--accent2);}
.last-updated-bar{padding:6px 12px;font-size:10px;color:var(--text3);text-align:center;border-top:1px solid var(--border);}

/* MAIN */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
#main::-webkit-scrollbar{width:5px;}
#main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* STOCK HEADER */
.stock-header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stock-header-left h2{font-size:20px;font-weight:700;}
.meta{display:flex;gap:10px;align-items:center;margin-top:4px;}
.sector-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(37,99,235,.08);color:var(--accent);border:1px solid rgba(37,99,235,.2);}
.updated-text{font-size:11px;color:var(--text3);}
.stock-header-right{text-align:right;}
.stock-header-price{font-size:26px;font-weight:700;}
.stock-header-change{font-size:13px;margin-top:2px;}
.refresh-btn{margin-left:12px;padding:6px 12px;font-size:11px;font-weight:600;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:6px;cursor:pointer;transition:all .15s;}
.refresh-btn:hover{background:var(--border);color:var(--text);}

/* CONTENT */
.content{padding:20px 28px;display:flex;flex-direction:column;gap:20px;}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:12px;}

/* SIGNAL BANNER */
.signal-banner{border-radius:var(--radius);padding:18px 22px;border-width:1px;border-style:solid;display:flex;align-items:flex-start;gap:16px;}
.signal-banner.BUY_MORE{background:var(--green-bg);border-color:var(--green-border);}
.signal-banner.HOLD{background:var(--amber-bg);border-color:var(--amber-border);}
.signal-banner.REVIEW{background:var(--red-bg);border-color:var(--red-border);}
.signal-icon{font-size:28px;margin-top:2px;}
.signal-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.signal-title{font-size:20px;font-weight:800;margin:2px 0 6px;}
.signal-title.BUY_MORE{color:var(--green);}
.signal-title.HOLD{color:var(--amber);}
.signal-title.REVIEW{color:var(--red);}
.signal-reason{font-size:13px;color:var(--text2);line-height:1.55;}

/* METRICS */
.metrics-grid{display:grid;gap:10px;}
.cols-6{grid-template-columns:repeat(6,1fr);}
.cols-4{grid-template-columns:repeat(4,1fr);}
.cols-3{grid-template-columns:repeat(3,1fr);}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;}
.metric-card.featured{border-color:var(--accent);background:linear-gradient(135deg,#fff 0%,rgba(37,99,235,.05) 100%);}
.metric-card.warn{border-color:var(--amber-border);}
.metric-card.good{border-color:var(--green-border);}
.metric-card.bad{border-color:var(--red-border);}
.metric-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.metric-value{font-size:20px;font-weight:700;margin:4px 0 2px;}
.metric-value.large{font-size:24px;}
.metric-sub{font-size:11px;color:var(--text3);}
.metric-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;}
.badge-high{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.badge-watch{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.badge-good{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.badge-primary{background:rgba(37,99,235,.08);color:var(--accent);border:1px solid rgba(37,99,235,.2);}

/* LAYOUT */
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.chart-wrap{position:relative;height:180px;}

/* TARGET BARS */
.target-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.target-label{font-size:11px;color:var(--text3);width:80px;flex-shrink:0;}
.target-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:10px;}
.target-bar-fill{height:100%;border-radius:10px;}
.target-val{font-size:11px;font-weight:600;width:50px;text-align:right;flex-shrink:0;}
.analyst-pills{display:flex;gap:8px;margin-top:12px;}
.analyst-pill{flex:1;text-align:center;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);}
.analyst-pill .count{font-size:18px;font-weight:700;}
.analyst-pill .lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.pill-buy .count{color:var(--green);}
.pill-hold .count{color:var(--amber);}
.pill-sell .count{color:var(--red);}

/* NEWS */
.news-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.news-item:last-child{border-bottom:none;}
.news-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.news-dot.positive{background:var(--green);}
.news-dot.negative{background:var(--red);}
.news-dot.neutral{background:var(--text3);}
.news-title{font-size:12px;line-height:1.45;}
.news-date{font-size:10px;color:var(--text3);margin-top:3px;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{background:var(--surface2);color:var(--text3);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px;padding:10px 12px;text-align:left;}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--surface2);}
.you-tag{font-size:9px;background:rgba(37,99,235,.1);color:var(--accent);border:1px solid rgba(37,99,235,.3);padding:1px 5px;border-radius:10px;margin-left:6px;}

/* TRIGGERS */
.trigger-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.trigger-item:last-child{border-bottom:none;}
.trigger-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.trigger-text{font-size:12px;color:var(--text2);line-height:1.45;}

/* THESIS */
.thesis-item{display:flex;gap:12px;align-items:center;padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;background:var(--surface2);}
.thesis-icon{font-size:18px;flex-shrink:0;}
.thesis-pillar{font-size:13px;font-weight:600;}
.thesis-detail{font-size:11px;color:var(--text3);margin-top:2px;}
.thesis-status{margin-left:auto;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0;}
.status-on_track,.status-strong{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.status-in_progress{background:rgba(37,99,235,.08);color:var(--accent);border:1px solid rgba(37,99,235,.2);}
.status-new_upside{background:rgba(124,58,237,.08);color:#7c3aed;border:1px solid rgba(124,58,237,.2);}
.status-watch{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.status-risk{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}

/* RISKS */
.risk-card{border-radius:8px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;background:var(--surface2);}
.risk-high{border-left:3px solid var(--red);}
.risk-medium{border-left:3px solid var(--amber);}
.risk-low{border-left:3px solid var(--green);}
.risk-severity{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0;margin-top:2px;}
.sev-high{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.sev-medium{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.sev-low{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.risk-title{font-size:12px;font-weight:600;}
.risk-detail{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;}

/* SEGMENTS */
.segment-bar-wrap{margin-bottom:12px;}
.segment-meta{display:flex;justify-content:space-between;margin-bottom:5px;}
.segment-track{height:6px;background:var(--border);border-radius:10px;}
.segment-fill{height:100%;border-radius:10px;}
.segment-growth{font-size:11px;margin-top:3px;}

/* SOURCES */
.sources-wrap{display:flex;flex-wrap:wrap;gap:8px;}
.source-link{font-size:11px;color:var(--accent);text-decoration:none;padding:4px 10px;border-radius:20px;border:1px solid rgba(37,99,235,.25);background:rgba(37,99,235,.06);}
.source-link:hover{background:rgba(37,99,235,.12);}

/* EMPTY / PENDING */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:60px;}
.empty-icon{font-size:56px;margin-bottom:16px;}
.empty-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.empty-sub{font-size:14px;color:var(--text3);line-height:1.6;max-width:360px;}

/* LOADING STATE */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;text-align:center;gap:16px;}
.spinner{width:48px;height:48px;border:4px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{font-size:18px;font-weight:700;}
.loading-steps{font-size:13px;color:var(--text3);line-height:1.8;}
.loading-step{padding:3px 0;transition:color .3s;}
.loading-step.done{color:var(--green);}
.loading-step.active{color:var(--accent);font-weight:600;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:480px;max-height:80vh;display:flex;flex-direction:column;box-shadow:var(--shadow);}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px;}
.modal-close:hover{background:var(--surface2);color:var(--text);}
.modal-search-wrap{padding:14px 16px;border-bottom:1px solid var(--border);}
.modal-search{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;}
.modal-search:focus{border-color:var(--accent);}
.modal-search::placeholder{color:var(--text3);}
.modal-list{flex:1;overflow-y:auto;padding:8px;}
.modal-stock-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;}
.modal-stock-item:hover{background:var(--surface2);}
.modal-stock-item.already-added{opacity:.4;cursor:not-allowed;}
.modal-stock-symbol{font-size:14px;font-weight:700;}
.modal-stock-name{font-size:11px;color:var(--text3);margin-top:2px;}
.modal-stock-sector{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);}
.modal-note{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.5;}

@media(max-width:1100px){.two-col{grid-template-columns:1fr;}.cols-4,.cols-6{grid-template-columns:repeat(2,1fr);}}
@media(max-width:800px){#sidebar{width:220px;min-width:220px;}.cols-6{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <h1>📈 Stock Tracker</h1>
    <p>AI-powered weekly analysis</p>
  </div>
  <div class="sidebar-body">
    <div class="sidebar-label">Your Watchlist</div>
    <div id="watchlist-container"></div>
  </div>
  <div class="sidebar-footer">
    <button class="add-btn" onclick="openModal()">+ Add Stock</button>
  </div>
  <div class="last-updated-bar" id="last-updated-bar">Last updated: —</div>
</aside>

<main id="main">
  <div id="main-content">
    <div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-title">Select a stock to view analysis</div>
      <div class="empty-sub">Choose from your watchlist, or click <strong>+ Add Stock</strong> to trigger a live AI analysis.</div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Stock to Watchlist</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-search-wrap">
      <input class="modal-search" id="modal-search" placeholder="Search by symbol or company name…" oninput="filterStocks()" />
    </div>
    <div class="modal-list" id="modal-list"></div>
    <div class="modal-note">⚡ Analysis runs live via Claude API — takes ~20 seconds. Results are saved locally.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
// ── Config ──────────────────────────────────────────────────────────────────
// When deployed on Vercel, this is a relative path — works automatically.
// For local dev, replace with your Vercel preview URL.
const API_BASE = '/api';

// ── Industry configs (determines which metrics are shown per sector) ─────────
const INDUSTRY_CONFIG = {
  railways:       { label:'Railways / Capital Goods',  color:'#2563eb', metricKeys:['orderBook','pe','ebitdaMargin','revenueGrowthYoY','patMargin','debtorDays'] },
  banking:        { label:'Banking & Finance',         color:'#7c3aed', metricKeys:['pb','nim','gnpa','nnpa','car','roe','roa','casa'] },
  it:             { label:'Information Technology',    color:'#0891b2', metricKeys:['revenueGrowthYoY','ebitMargin','dealWins','attrition','pe','cashPerShare'] },
  fmcg:           { label:'FMCG / Consumer',           color:'#d97706', metricKeys:['volumeGrowth','valueGrowth','ebitdaMargin','pe','evEbitda','dividendYield'] },
  pharma:         { label:'Pharmaceuticals',           color:'#059669', metricKeys:['rdPercent','usRevPercent','andaApproved','ebitdaMargin','pe','debtEquity'] },
  capital_markets:{ label:'Capital Markets',           color:'#db2777', metricKeys:['aumGrowth','aum','activeClients','marketShare','pe','roe'] },
  real_estate:    { label:'Real Estate',               color:'#ea580c', metricKeys:['preSales','preSalesGrowth','collections','netDebt','landBank','pe'] },
  auto:           { label:'Automobiles',               color:'#65a30d', metricKeys:['volumeGrowth','evMix','ebitdaMargin','marketShare','pe','debtEquity'] },
  metals:         { label:'Metals & Mining',           color:'#475569', metricKeys:['ebitdaPerTonne','netDebtEbitda','productionVol','pe','dividendYield','roe'] },
  energy:         { label:'Energy / Oil & Gas',        color:'#ca8a04', metricKeys:['dividendYield','evEbitda','roe','netDebt','pe','replacementRatio'] },
};

const KNOWN_STOCKS = [
  {symbol:'TITAGARH',   name:'Titagarh Rail Systems Ltd',    sector:'railways'},
  {symbol:'TEXRAIL',    name:'Texmaco Rail & Engineering',   sector:'railways'},
  {symbol:'JUPITERWAG', name:'Jupiter Wagons Ltd',           sector:'railways'},
  {symbol:'BEML',       name:'BEML Ltd',                     sector:'railways'},
  {symbol:'HDFCBANK',   name:'HDFC Bank Ltd',                sector:'banking'},
  {symbol:'ICICIBANK',  name:'ICICI Bank Ltd',               sector:'banking'},
  {symbol:'KOTAKBANK',  name:'Kotak Mahindra Bank',          sector:'banking'},
  {symbol:'SBIN',       name:'State Bank of India',          sector:'banking'},
  {symbol:'AXISBANK',   name:'Axis Bank Ltd',                sector:'banking'},
  {symbol:'TCS',        name:'Tata Consultancy Services',    sector:'it'},

  {symbol:'WIPRO',      name:'Wipro Ltd',                    sector:'it'},
  {symbol:'HCLTECH',    name:'HCL Technologies Ltd',         sector:'it'},
  {symbol:'LTIM',       name:'LTIMindtree Ltd',              sector:'it'},
  {symbol:'HINDUNILVR', name:'Hindustan Unilever Ltd',       sector:'fmcg'},
  {symbol:'ITC',        name:'ITC Ltd',                      sector:'fmcg'},
  {symbol:'NESTLEIND',  name:'Nestle India Ltd',             sector:'fmcg'},
  {symbol:'BRITANNIA',  name:'Britannia Industries Ltd',     sector:'fmcg'},
  {symbol:'SUNPHARMA',  name:'Sun Pharmaceutical Industries',sector:'pharma'},
  {symbol:'DRREDDY',    name:"Dr. Reddy's Laboratories",    sector:'pharma'},
  {symbol:'CIPLA',      name:'Cipla Ltd',                    sector:'pharma'},
  {symbol:'DIVISLAB',   name:"Divi's Laboratories Ltd",     sector:'pharma'},
  {symbol:'ANGELONE',   name:'Angel One Ltd',                sector:'capital_markets'},
  {symbol:'360ONE',     name:'360 One WAM Ltd',              sector:'capital_markets'},
  {symbol:'MOFSL',      name:'Motilal Oswal Financial Svcs', sector:'capital_markets'},
  {symbol:'DLF',        name:'DLF Ltd',                      sector:'real_estate'},
  {symbol:'GODREJPROP', name:'Godrej Properties Ltd',        sector:'real_estate'},
  {symbol:'PRESTIGE',   name:'Prestige Estates Projects',    sector:'real_estate'},
  {symbol:'MARUTI',     name:'Maruti Suzuki India Ltd',      sector:'auto'},
  {symbol:'TATAMOTORS', name:'Tata Motors Ltd',              sector:'auto'},
  {symbol:'M&M',        name:'Mahindra & Mahindra Ltd',      sector:'auto'},
  {symbol:'BAJAJ-AUTO', name:'Bajaj Auto Ltd',               sector:'auto'},
  {symbol:'TATASTEEL',  name:'Tata Steel Ltd',               sector:'metals'},
  {symbol:'JSWSTEEL',   name:'JSW Steel Ltd',                sector:'metals'},
  {symbol:'HINDALCO',   name:'Hindalco Industries Ltd',      sector:'metals'},
  {symbol:'RELIANCE',   name:'Reliance Industries Ltd',      sector:'energy'},
  {symbol:'ONGC',       name:'Oil & Natural Gas Corporation',sector:'energy'},
  {symbol:'NTPC',       name:'NTPC Ltd',                     sector:'energy'},
  {symbol:'COALINDIA',  name:'Coal India Ltd',               sector:'energy'},
];

// ── State ────────────────────────────────────────────────────────────────────
let activeStock = null;
let activeChart = null;

// ── Storage: load/save analysed stocks in localStorage ──────────────────────
function getStoredData() {
  try { return JSON.parse(localStorage.getItem('stockData') || '{}'); } catch { return {}; }
}
function storeAnalysis(symbol, data) {
  const all = getStoredData();
  all[symbol] = data;
  localStorage.setItem('stockData', JSON.stringify(all));
}
function getWatchlist() {
  try { return JSON.parse(localStorage.getItem('watchlist') || '["TITAGARH"]'); } catch { return ['TITAGARH']; }
}
function saveWatchlist(l) { localStorage.setItem('watchlist', JSON.stringify(l)); }

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const container = document.getElementById('watchlist-container');
  const wl = getWatchlist();
  const stored = getStoredData();

  let latestUpdate = null;
  Object.values(stored).forEach(d => {
    if (d?.lastUpdated && (!latestUpdate || d.lastUpdated > latestUpdate)) latestUpdate = d.lastUpdated;
  });
  document.getElementById('last-updated-bar').textContent = latestUpdate
    ? 'Last updated: ' + fmtDate(latestUpdate) : 'Last updated: —';

  container.innerHTML = wl.map(sym => {
    const d = stored[sym];
    const k = KNOWN_STOCKS.find(x => x.symbol === sym);
    const name   = d?.name || k?.name || sym;
    const signal = d?.signal || (d === null ? 'LOADING' : 'PENDING');
    const price  = d?.price?.current ? '₹' + d.price.current.toLocaleString('en-IN') : '—';
    const upside = d?.targets?.average && d?.price?.current
      ? (((d.targets.average - d.price.current) / d.price.current) * 100).toFixed(0) + '% upside'
      : signal === 'LOADING' ? 'Analysing…' : 'Pending analysis';
    const isActive = activeStock === sym;
    return `<div class="stock-card${isActive?' active':''}" onclick="selectStock('${sym}')">
      <div class="stock-card-top"><span class="stock-symbol">${sym}</span>
        <span class="signal-badge signal-${signal}">${signal.replace('_',' ')}</span></div>
      <div class="stock-card-bottom"><span class="stock-price">${price}</span>
        <span class="stock-upside" style="${signal==='PENDING'||signal==='LOADING'?'color:var(--text3)':''}">${upside}</span></div>
      <div class="stock-name">${name}</div>
    </div>`;
  }).join('');
}

// ── Select stock ─────────────────────────────────────────────────────────────
function selectStock(sym) {
  activeStock = sym;
  renderSidebar();
  const stored = getStoredData();
  const d = stored[sym];
  if (!d) { renderPending(sym); return; }
  renderAnalysis(d);
}

function renderPending(sym) {
  const k = KNOWN_STOCKS.find(x => x.symbol === sym);
  document.getElementById('main-content').innerHTML = `
    <div class="stock-header"><div class="stock-header-left"><h2>${sym}</h2>
      <div class="meta"><span class="sector-badge">${k ? (INDUSTRY_CONFIG[k.sector]?.label||k.sector) : 'Unknown'}</span></div>
    </div></div>
    <div class="loading-state">
      <div class="empty-icon" style="font-size:48px">⏳</div>
      <div class="loading-title">No analysis yet</div>
      <div class="loading-steps" style="font-size:13px;color:var(--text3)">
        This stock was added to your watchlist.<br>
        Click <strong>Analyse Now</strong> to run a live analysis.
      </div>
      <button onclick="triggerAnalysis('${sym}')" style="margin-top:8px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
        ⚡ Analyse Now
      </button>
    </div>`;
}

// ── Live Claude API call ─────────────────────────────────────────────────────
async function triggerAnalysis(sym) {
  const k = KNOWN_STOCKS.find(x => x.symbol === sym);
  const sector = k?.sector || 'railways';
  const name   = k?.name   || sym;
  activeStock  = sym;

  // Show loading state
  renderLoadingState(sym, name);

  // Mark as loading in sidebar
  const wl = getWatchlist();
  const stored = getStoredData();
  stored[sym] = null; // null = loading
  localStorage.setItem('stockData', JSON.stringify(stored));
  renderSidebar();

  try {
    // Step 1: fetching data (shown in UI)
    setLoadingStep(1);
    const url = `${API_BASE}/analyze?symbol=${encodeURIComponent(sym)}&sector=${sector}&name=${encodeURIComponent(name)}`;
    setLoadingStep(2);

    const res = await fetch(url);
    setLoadingStep(3);

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const analysis = await res.json();
    if (analysis.error) throw new Error(analysis.error);

    setLoadingStep(4);

    // Save to localStorage and render
    storeAnalysis(sym, analysis);
    renderSidebar();
    renderAnalysis(analysis);

  } catch (err) {
    renderError(sym, err.message);
    // Remove loading marker
    const s = getStoredData();
    delete s[sym];
    localStorage.setItem('stockData', JSON.stringify(s));
    renderSidebar();
  }
}

function renderLoadingState(sym, name) {
  document.getElementById('main-content').innerHTML = `
    <div class="stock-header"><div class="stock-header-left"><h2>${name}</h2>
      <div class="meta"><span class="updated-text">NSE: ${sym}</span></div>
    </div></div>
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-title">Analysing ${sym}…</div>
      <div class="loading-steps" id="loading-steps">
        <div class="loading-step active" id="step-0">📡 Fetching live data from Yahoo Finance</div>
        <div class="loading-step"        id="step-1">🤖 Running Claude AI analysis</div>
        <div class="loading-step"        id="step-2">📊 Processing sector-specific metrics</div>
        <div class="loading-step"        id="step-3">✅ Rendering dashboard</div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">~20 seconds</div>
    </div>`;
}

function setLoadingStep(step) {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`step-${i}`);
    if (!el) continue;
    el.className = 'loading-step' + (i < step ? ' done' : i === step ? ' active' : '');
  }
}

function renderError(sym, msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="stock-header"><div class="stock-header-left"><h2>${sym}</h2></div></div>
    <div class="loading-state">
      <div style="font-size:48px">⚠️</div>
      <div class="loading-title">Analysis Failed</div>
      <div class="loading-steps" style="color:var(--red)">${msg}</div>
      <button onclick="triggerAnalysis('${sym}')" style="margin-top:12px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
        ↺ Try Again
      </button>
    </div>`;
}

// ── Add stock (triggers live API call) ───────────────────────────────────────
function addToWatchlist(sym) {
  const wl = getWatchlist();
  if (!wl.includes(sym)) { wl.push(sym); saveWatchlist(wl); }
  closeModal();
  renderSidebar();
  // Immediately trigger analysis
  triggerAnalysis(sym);
}

// ── Main analysis renderer ───────────────────────────────────────────────────
function renderAnalysis(d) {
  const cfg    = INDUSTRY_CONFIG[d.sector] || INDUSTRY_CONFIG.railways;
  const upside = d.targets?.average && d.price?.current
    ? (((d.targets.average - d.price.current) / d.price.current) * 100).toFixed(1)
    : '—';
  const emoji  = {BUY_MORE:'🟢',HOLD:'🟡',REVIEW:'🔴'}[d.signal] || '⏳';
  const label  = {BUY_MORE:'ADD MORE',HOLD:'HOLD',REVIEW:'REVIEW FOR EXIT'}[d.signal] || d.signal;
  const chg    = d.price?.changePercent || 0;

  document.getElementById('main-content').innerHTML = `
    <div class="stock-header">
      <div class="stock-header-left">
        <h2>${d.name}</h2>
        <div class="meta">
          <span class="sector-badge" style="color:${cfg.color};border-color:${cfg.color}40;background:${cfg.color}12">${cfg.label}</span>
          <span class="updated-text">NSE: ${d.symbol} · Analysed: ${d.lastUpdated}</span>
        </div>
      </div>
      <div class="stock-header-right" style="display:flex;align-items:center;gap:16px">
        <div>
          <div class="stock-header-price">₹${(d.price?.current||0).toLocaleString('en-IN')}</div>
          <div class="stock-header-change" style="color:${chg>=0?'var(--green)':'var(--red)'}">
            ${chg>=0?'▲':'▼'} ${Math.abs(chg)}% &nbsp;·&nbsp; 52W: ₹${d.price?.weekLow52||'—'} – ₹${d.price?.weekHigh52||'—'}
          </div>
        </div>
        <button class="refresh-btn" onclick="triggerAnalysis('${d.symbol}')">↺ Refresh</button>
      </div>
    </div>
    <div class="content">
      <div class="signal-banner ${d.signal}">
        <div class="signal-icon">${emoji}</div>
        <div><div class="signal-label">This Week's Signal</div>
          <div class="signal-title ${d.signal}">${label}</div>
          <div class="signal-reason">${d.signalReason}</div>
        </div>
      </div>
      <div><div class="section-title">📊 Key Metrics — ${cfg.label} Focus</div>
        <div class="metrics-grid cols-${Math.min(cfg.metricKeys.length,6)}" id="metrics-grid"></div>
      </div>
      <div class="two-col">
        <div>
          <div class="card"><div class="section-title">📈 Quarterly Performance (₹ Cr)</div>
            <div class="chart-wrap"><canvas id="chart-main"></canvas></div></div>
          ${renderSegments(d)}
        </div>
        <div style="display:flex;flex-direction:column;gap:16px">
          ${renderTargets(d,upside)}
          ${renderNews(d)}
        </div>
      </div>
      ${renderCompetitors(d)}
      <div class="two-col">
        <div class="card"><div class="section-title">✅ When to ADD MORE</div>
          ${(d.addTriggers||[]).map(t=>`<div class="trigger-item"><div class="trigger-icon" style="color:var(--green)">＋</div><div class="trigger-text">${t}</div></div>`).join('')}
        </div>
        <div class="card"><div class="section-title">🚨 When to REVIEW FOR EXIT</div>
          ${(d.sellTriggers||[]).map(t=>`<div class="trigger-item"><div class="trigger-icon" style="color:var(--red)">⚠</div><div class="trigger-text">${t}</div></div>`).join('')}
        </div>
      </div>
      ${renderThesis(d)}
      ${renderRisks(d)}
      <div class="card"><div class="section-title">🔗 Sources</div>
        <div class="sources-wrap">${(d.sources||[]).map(s=>`<a class="source-link" href="${s.url||'#'}" target="_blank">${s.title}</a>`).join('')}</div>
      </div>
    </div>`;

  renderMetrics(d, cfg);
  setTimeout(() => renderChart(d), 50);
}

// ── Sub-renderers ────────────────────────────────────────────────────────────
function renderMetrics(d, cfg) {
  const grid = document.getElementById('metrics-grid');
  if (!grid) return;
  grid.innerHTML = cfg.metricKeys.map(key => {
    const m = d.keyMetrics?.[key]; if (!m) return '';
    const sc = m.status === 'high' ? 'bad' : m.status === 'warn' ? 'warn' : m.status === 'good' ? 'good' : '';
    const bm = {high:['badge-high','HIGH'],warn:['badge-watch','WATCH'],good:['badge-good','STRONG'],ok:['badge-primary','OK']};
    const [bc,bt] = bm[m.status]||['',''];
    const isFeat = cfg.metricKeys.indexOf(key) === 0;
    return `<div class="metric-card ${isFeat?'featured':''} ${sc}">
      ${bc?`<span class="metric-badge ${bc}">${bt}</span>`:''}
      <div class="metric-label">${m.label||key}</div>
      <div class="metric-value ${isFeat?'large':''}">${m.value}</div>
      <div class="metric-sub">${m.sub||''}</div></div>`;
  }).join('');
}

function renderSegments(d) {
  if (!d.segments?.length) return '';
  const total = d.segments.reduce((s,sg)=>s+sg.revenue,0);
  return `<div class="card" style="margin-top:16px"><div class="section-title">📦 Segment Breakdown</div>
    ${d.segments.map(sg=>{
      const pct=((sg.revenue/total)*100).toFixed(0);
      const gc = sg.growth>=0?'var(--green)':'var(--red)';
      return `<div class="segment-bar-wrap">
        <div class="segment-meta"><span style="font-size:12px">${sg.name}</span>
          <span style="font-size:12px;font-weight:600">₹${sg.revenue.toLocaleString('en-IN')} Cr <span style="color:var(--text3)">(${pct}%)</span></span></div>
        <div class="segment-track"><div class="segment-fill" style="width:${pct}%;background:${sg.color||cfg?.color||'#2563eb'}"></div></div>
        <div class="segment-growth" style="color:${gc}">${sg.growth>=0?'▲':'▼'} ${Math.abs(sg.growth)}% YoY</div>
      </div>`;
    }).join('')}</div>`;
}

function renderTargets(d, upside) {
  const t = d.targets||{}; const p = d.price||{};
  const mn=(p.weekLow52||0)*.9, mx=(t.high||0)*1.05;
  const pct=(v)=>mx>mn?((v-mn)/(mx-mn)*100).toFixed(0):50;
  return `<div class="card"><div class="section-title">🎯 Analyst Targets</div>
    <div class="target-row"><div class="target-label">Current</div><div class="target-bar-wrap"><div class="target-bar-fill" style="width:${pct(p.current||0)}%;background:#94a3b8"></div></div><div class="target-val">₹${p.current||'—'}</div></div>
    <div class="target-row"><div class="target-label">Low Target</div><div class="target-bar-wrap"><div class="target-bar-fill" style="width:${pct(t.low||0)}%;background:#f59e0b"></div></div><div class="target-val">₹${t.low||'—'}</div></div>
    <div class="target-row"><div class="target-label">Avg Target</div><div class="target-bar-wrap"><div class="target-bar-fill" style="width:${pct(t.average||0)}%;background:#2563eb"></div></div><div class="target-val">₹${t.average||'—'}</div></div>
    <div class="target-row"><div class="target-label">High Target</div><div class="target-bar-wrap"><div class="target-bar-fill" style="width:${pct(t.high||0)}%;background:#16a34a"></div></div><div class="target-val">₹${t.high||'—'}</div></div>
    <div style="margin-top:10px;font-size:12px;color:var(--text3)">Upside to avg: <span style="color:var(--green);font-weight:700">+${upside}%</span></div>
    <div class="analyst-pills">
      <div class="analyst-pill pill-buy"><div class="count">${d.analysts?.buy||0}</div><div class="lbl">Buy</div></div>
      <div class="analyst-pill pill-hold"><div class="count">${d.analysts?.hold||0}</div><div class="lbl">Hold</div></div>
      <div class="analyst-pill pill-sell"><div class="count">${d.analysts?.sell||0}</div><div class="lbl">Sell</div></div>
    </div></div>`;
}

function renderNews(d) {
  return `<div class="card" style="flex:1"><div class="section-title">📰 Latest Developments</div>
    ${(d.news||[]).map(n=>`<div class="news-item"><div class="news-dot ${n.sentiment}"></div>
      <div>${n.url?`<a class="news-title" href="${n.url}" target="_blank" style="color:var(--text);text-decoration:none">${n.title}</a>`:`<div class="news-title">${n.title}</div>`}
      <div class="news-date">${n.date}</div></div></div>`).join('')}</div>`;
}

function renderCompetitors(d) {
  if (!d.competitors?.length) return '';
  const hdr={name:'Company',orderBook:'Order Book',pe:'P/E',revenueGrowth:'Rev Growth',margin:'EBITDA Mgn',note:'Focus'};
  const keys=Object.keys(d.competitors[0]).filter(k=>!['symbol','isYou'].includes(k));
  return `<div class="card"><div class="section-title">🏁 Competitor Comparison</div>
    <table class="data-table"><thead><tr>${keys.map(k=>`<th>${hdr[k]||k}</th>`).join('')}</tr></thead>
    <tbody>${d.competitors.map(c=>`<tr style="${c.isYou?'background:rgba(37,99,235,.05)':''}">
      ${keys.map(k=>{let v=c[k];if(k==='name'&&c.isYou)v+=`<span class="you-tag">YOU</span>`;return`<td>${v}</td>`;}).join('')}
    </tr>`).join('')}</tbody></table></div>`;
}

function renderThesis(d) {
  if (!d.thesis?.length) return '';
  const sl={on_track:'On Track',strong:'Strong',in_progress:'In Progress',new_upside:'New Upside',watch:'Watch',risk:'At Risk'};
  return `<div class="card"><div class="section-title">🧭 Long-Term Investment Thesis</div>
    ${d.thesis.map(t=>`<div class="thesis-item"><div class="thesis-icon">${t.icon}</div>
      <div><div class="thesis-pillar">${t.pillar}</div><div class="thesis-detail">${t.detail}</div></div>
      <div class="thesis-status status-${t.status}">${sl[t.status]||t.status}</div></div>`).join('')}</div>`;
}

function renderRisks(d) {
  if (!d.risks?.length) return '';
  return `<div class="card"><div class="section-title">⚠️ Key Risks to Monitor</div>
    ${d.risks.map(r=>`<div class="risk-card risk-${r.severity}">
      <span class="risk-severity sev-${r.severity}">${r.severity.toUpperCase()}</span>
      <div><div class="risk-title">${r.title}</div><div class="risk-detail">${r.detail}</div></div>
    </div>`).join('')}</div>`;
}

function renderChart(d) {
  const ctx = document.getElementById('chart-main');
  if (!ctx || !d.quarterly?.length) return;
  if (activeChart) { activeChart.destroy(); activeChart = null; }
  activeChart = new Chart(ctx, {
    type:'bar',
    data:{
      labels: d.quarterly.map(q=>q.quarter),
      datasets:[
        {label:'Revenue', data:d.quarterly.map(q=>q.revenue), backgroundColor:'rgba(37,99,235,.7)',  borderRadius:4, order:1},
        {label:'EBITDA',  data:d.quarterly.map(q=>q.ebitda),  backgroundColor:'rgba(124,58,237,.7)', borderRadius:4, order:1},
        {label:'PAT',     data:d.quarterly.map(q=>q.pat), type:'line', borderColor:'#d97706',
          backgroundColor:'rgba(217,119,6,.1)', pointBackgroundColor:'#d97706',
          tension:.4, fill:false, order:0, yAxisID:'y2'},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#475569',font:{size:11},padding:12,boxWidth:12}}},
      scales:{
        x: {ticks:{color:'#64748b',font:{size:10}},grid:{color:'#e2e8f0'}},
        y: {ticks:{color:'#64748b',font:{size:10}},grid:{color:'#e2e8f0'},title:{display:true,text:'₹ Cr',color:'#64748b',font:{size:10}}},
        y2:{position:'right',ticks:{color:'#64748b',font:{size:10}},grid:{drawOnChartArea:false},title:{display:true,text:'PAT',color:'#64748b',font:{size:10}}},
      }
    }
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal()  { filterStocks(); document.getElementById('modal').classList.add('open'); const s=document.getElementById('modal-search');s.value='';s.focus(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal')) closeModal(); }
function filterStocks() {
  const q  = document.getElementById('modal-search').value.toLowerCase();
  const wl = getWatchlist();
  const items = KNOWN_STOCKS.filter(s=>!q||s.symbol.toLowerCase().includes(q)||s.name.toLowerCase().includes(q));
  const cfg = INDUSTRY_CONFIG;
  document.getElementById('modal-list').innerHTML = items.map(s=>{
    const already = wl.includes(s.symbol);
    const c = cfg[s.sector];
    return `<div class="modal-stock-item${already?' already-added':''}" onclick="${already?'':` addToWatchlist('${s.symbol}')`}">
      <div><div class="modal-stock-symbol">${s.symbol}</div><div class="modal-stock-name">${s.name}</div></div>
      <span class="modal-stock-sector" style="color:${c?.color||'var(--text3)'}">${c?.label||s.sector}</span></div>`;
  }).join('') || '<div style="padding:20px;text-align:center;color:var(--text3)">No stocks found</div>';
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return iso||'—'; }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
renderSidebar();
const initWl = getWatchlist();
if (initWl.length > 0) selectStock(initWl[0]);
</script>
